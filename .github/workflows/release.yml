name: CI & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test and Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: x86_64-linux
            binary_name: connect4-tui
            release_name: connect4
            archive_ext: tar.gz
          - os: windows-latest
            suffix: x86_64-windows
            binary_name: connect4-tui.exe
            release_name: connect4.exe
            archive_ext: zip
          - os: macos-latest
            suffix: aarch64-macos
            binary_name: connect4-tui
            release_name: connect4
            archive_ext: tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Check Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Tests
        run: cargo test --all-features --all-targets

      - name: Build Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo build --profile dist --all-features

      - name: Get Version
        if: startsWith(github.ref, 'refs/tags/v')
        id: get_version
        run: |
          RAW_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "connect4") | .version')
          echo "VERSION=v$RAW_VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p staging
          cp target/dist/${{ matrix.binary_name }} staging/${{ matrix.release_name }}
          [ -f README.md ] && cp README.md staging/
          [ -f LICENSE ] && cp LICENSE staging/

          # Additional stripping for non-Windows (dist profile handles symbols, but this ensures minimal size)
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            strip staging/${{ matrix.release_name }}
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            strip -x staging/${{ matrix.release_name }}
          fi

      - name: Create Archive (Unix)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os != 'Windows'
        run: |
          tar -czf connect4-${{ steps.get_version.outputs.VERSION }}-${{ matrix.suffix }}.${{ matrix.archive_ext }} -C staging .

      - name: Create Archive (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        run: |
          7z a connect4-${{ steps.get_version.outputs.VERSION }}-${{ matrix.suffix }}.${{ matrix.archive_ext }} ./staging/*

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: connect4-*.${{ matrix.archive_ext }}

  release:
    name: Create Release
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/connect4-v*.*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
